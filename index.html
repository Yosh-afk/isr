<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Nómina México</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="contenedor">

    <h1>Calculadora de Nómina</h1>

    <div class="card">

        <label>Sueldo Bruto</label>
        <input
            type="number"
            id="sueldo"
            placeholder="Ej. 15000"
        >

        <label>Periodicidad</label>

        <select id="periodo">
            <option value="semanal">Semanal</option>
            <option value="quincenal">Quincenal</option>
            <option value="mensual">Mensual</option>
        </select>

        <button onclick="calcularNomina()">
            Calcular Nómina
        </button>

    </div>

    <div class="resultado">

        <h2>Resultado</h2>

        <div class="fila">
            <span>Sueldo Bruto</span>
            <span id="bruto">$0.00</span>
        </div>

        <div class="fila">
            <span>ISR</span>
            <span id="isr">$0.00</span>
        </div>

        <div class="fila">
            <span>IMSS</span>
            <span id="imss">$0.00</span>
        </div>

        <div class="fila">
            <span>Total Impuestos</span>
            <span id="impuestos">$0.00</span>
        </div>

        <div class="fila neto">
            <span>Sueldo Neto</span>
            <span id="neto">$0.00</span>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
