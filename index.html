<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora ISR México</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Calculadora de Nómina e ISR</h1>

    <div class="formulario">

        <div class="campo">
            <label>Nombre</label>
            <input type="text" id="nombre">
        </div>

        <div class="campo">
            <label>Sueldo Base</label>
            <input type="number" id="sueldo" value="1980">
        </div>

        <div class="campo">
            <label>Comisiones</label>
            <input type="number" id="comisiones" value="300">
        </div>

        <div class="campo">
            <label>Séptimo Día</label>
            <input type="number" id="septimo" value="330">
        </div>

        <button onclick="calcularNomina()">
            Generar Nómina
        </button>

    </div>

    <div class="resultado">

        <h2>Recibo de Nómina</h2>

        <table>
            <tr>
                <th>Concepto</th>
                <th>Importe</th>
            </tr>

            <tr>
                <td>Sueldo</td>
                <td id="rSueldo">$0</td>
            </tr>

            <tr>
                <td>Comisiones</td>
                <td id="rComisiones">$0</td>
            </tr>

            <tr>
                <td>Séptimo Día</td>
                <td id="rSeptimo">$0</td>
            </tr>

            <tr>
                <td>ISR</td>
                <td id="rISR">$0</td>
            </tr>

            <tr>
                <td>IMSS</td>
                <td id="rIMSS">$0</td>
            </tr>

            <tr class="neto">
                <td>Neto a Pagar</td>
                <td id="rNeto">$0</td>
            </tr>

        </table>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
